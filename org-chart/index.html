<style>
:root{
  --primary:#1b3a6b; --primary-2:#254d8f; --primary-3:#1a2e54;
  --gold:#b8860b; --gold-light:#d4a017; --gold-bright:#f0c040;
  /* panel-matching plum palette (same as control sidebar) */
  --ps-plum-dark:#1a0f2e; --ps-plum:#2a1b47; --ps-green:#173128;
  --ps-gold:#c9a227; --ps-gold-light:#e8b547;
  --page-bg:#f4f6fb; --card-bg:#ffffff; --card-border:#e2e7f1;
  --card-radius:8px;
  --text:#1a2332; --text-2:#4a5568; --text-muted:#8a96a8;
  --c-gen:#5b3f93; --c-bs:#1b6ec2; --c-inf:#0e8a8a; --c-tech:#c2780b; --c-design:#7c3aed;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;overflow-x:hidden}
body{font-family:'Cairo','Tajawal',sans-serif;background:var(--page-bg);color:var(--text);min-height:100vh}

/* ===== UNIFIED HEADER (matches all portal pages) ===== */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:72px;position:sticky;top:0;z-index:100;width:100%;
  background:linear-gradient(105deg,var(--ps-plum-dark) 0%,var(--ps-plum) 55%,var(--ps-green) 100%);
  border-bottom:2px solid var(--ps-gold-light);
  box-shadow:0 2px 14px rgba(26,15,46,.32);
}
.header-logo{display:flex;align-items:center;gap:14px}
.header-logo img{height:52px;width:auto;object-fit:contain}
.header-logo .h-title{font-size:16px;font-weight:900;color:var(--gold-bright);line-height:1.2}
.header-logo .h-sub{font-size:10px;color:rgba(255,255,255,.55)}
.header-actions{display:flex;align-items:center;gap:10px}
.hbtn{
  display:inline-flex;align-items:center;cursor:pointer;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.26);
  color:#fff;font-family:inherit;font-size:13px;font-weight:700;
  padding:8px 14px;border-radius:7px;transition:.15s;
}
.hbtn:hover{background:rgba(255,255,255,.22)}

/* ===== LAYOUT ===== */
.main{padding:22px 26px 70px;max-width:100%;margin:0 auto}
.page-head{margin:2px 0 16px}
.page-head h1{font-size:24px;font-weight:900;color:var(--primary)}
.page-head p{color:var(--text-muted);font-size:13.5px;margin-top:4px;font-weight:600}

/* ===== STATS (flat, accent edge — no circles) ===== */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:18px 0}
.stat{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-inline-start:4px solid currentColor;border-radius:var(--card-radius);
  padding:14px 16px;
}
.stat .num{font-size:24px;font-weight:800;line-height:1;color:var(--text)}
.stat .lbl{font-size:12px;color:var(--text-muted);font-weight:600;margin-top:6px}

/* ===== TOOLBAR ===== */
.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.search-wrap{position:relative;flex:1;min-width:240px}
.search-wrap svg{position:absolute;inset-inline-start:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;fill:var(--text-muted)}
#search{
  width:100%;padding:11px 42px;border:1px solid var(--card-border);border-radius:7px;
  font-family:inherit;font-size:14px;font-weight:600;background:var(--card-bg);color:var(--text);outline:none;transition:.15s;
}
#search:focus{border-color:var(--primary-2);box-shadow:0 0 0 3px rgba(37,77,143,.12)}
.legend{display:flex;gap:7px;flex-wrap:wrap}
.lg{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 11px;border-radius:6px;border:1px solid var(--card-border);background:#fff;color:var(--text-2)}
.lg i{width:9px;height:9px;border-radius:2px}

/* ===== PERSON CARD (no avatar — accent edge only) ===== */
.person{
  position:relative;background:var(--card-bg);
  border:1px solid var(--card-border);
  border-inline-start:3px solid var(--accent,#cbd5e1);
  border-radius:var(--card-radius);padding:10px 14px;
  transition:background .15s,border-color .15s,box-shadow .15s;
}
.person:hover{background:#f7f9fd}
.person.dim{opacity:.22}
.person.hit{border-color:var(--gold-light);box-shadow:0 0 0 2px rgba(212,160,23,.28)}
.p-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-title{font-size:12px;color:var(--text-2);font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-mail{font-size:11px;color:var(--text-muted);margin-top:3px;text-decoration:none;display:inline-block;direction:ltr}
.p-mail:hover{color:var(--accent);text-decoration:underline}
.badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;margin-bottom:5px;color:var(--accent);background:var(--accent-soft)}
.person.is-mgr{border-inline-start-width:4px}
.person.is-mgr .p-name{font-size:15px}

/* department accent tokens */
.gen-c{--accent:var(--c-gen);--accent-soft:#efeaf8}
.bs-c{--accent:var(--c-bs);--accent-soft:#e8f1fb}
.inf-c{--accent:var(--c-inf);--accent-soft:#e3f4f4}
.tech-c{--accent:var(--c-tech);--accent-soft:#fbf2df}
.design-c{--accent:var(--c-design);--accent-soft:#f1eafd}

/* ===== DIRECTOR (flat banner) ===== */
.director-wrap{display:flex;justify-content:center;margin:4px 0}
.director{
  width:min(520px,100%);text-align:center;border-radius:10px;padding:20px 24px;
  background:linear-gradient(105deg,var(--ps-plum-dark),var(--ps-plum) 55%,var(--ps-green));
  border:1px solid rgba(232,181,71,.5);border-top:3px solid var(--ps-gold-light);
  color:#fff;
}
.director .d-name{font-size:20px;font-weight:900}
.director .d-title{font-size:13px;color:var(--ps-gold-light);font-weight:700;margin-top:4px}
.director .d-mail{font-size:12px;color:rgba(255,255,255,.72);margin-top:6px;text-decoration:none;display:inline-block;direction:ltr}
.director .d-mail:hover{color:#fff;text-decoration:underline}
.trunk{width:2px;height:22px;background:linear-gradient(var(--gold-light),transparent);margin:0 auto}

/* ===== OFFICE ROW ===== */
.office{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:16px 18px;margin:4px 0 14px}
.section-cap{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.section-cap .dot{width:10px;height:10px;border-radius:2px}
.section-cap h2{font-size:15px;font-weight:800}
.section-cap small{color:var(--text-muted);font-weight:600;font-size:12px}
.office-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}

/* ===== DEPARTMENTS ===== */
.dept-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:4px}
.dept{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
.dept::before{content:'';position:absolute;top:0;inset-inline:0;height:4px;background:var(--accent)}
.dept-head{display:flex;align-items:center;gap:10px;margin:6px 0 14px}
.dept-code{font-size:13px;font-weight:800;color:#fff;background:var(--accent);padding:6px 11px;border-radius:6px;letter-spacing:.5px;flex:none}
.dept-head .dh-name{font-size:16px;font-weight:800;line-height:1.2}
.dept-head .dh-sub{font-size:11.5px;color:var(--text-muted);font-weight:600;margin-top:2px}

.unit{margin-top:12px;border:1px solid var(--card-border);border-radius:8px;padding:12px;background:#fafbfd}
.unit-cap{font-size:12.5px;font-weight:800;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.unit-cap::before{content:'';width:8px;height:8px;border-radius:2px;background:var(--accent)}
.stack{display:grid;gap:8px}
.team{margin-top:8px;padding-inline-start:12px;border-inline-start:2px solid var(--card-border)}
.team .team-lead{margin-bottom:8px}
.team .members{display:grid;gap:8px;padding-inline-start:10px;border-inline-start:1px dotted var(--card-border)}

.dept.gen{--accent:var(--c-gen);--accent-soft:#efeaf8}
.dept.bs{--accent:var(--c-bs);--accent-soft:#e8f1fb}
.dept.inf{--accent:var(--c-inf);--accent-soft:#e3f4f4}
.dept.tech{--accent:var(--c-tech);--accent-soft:#fbf2df}
.dept.design{--accent:var(--c-design);--accent-soft:#f1eafd}

/* subtle fade only */
@keyframes fade{from{opacity:0}to{opacity:1}}
.anim{opacity:0;animation:fade .4s ease forwards}

.empty-note{display:none;text-align:center;color:var(--text-muted);font-weight:700;padding:30px}

@media(max-width:1080px){.dept-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.main{padding:16px 12px 60px}.header{padding:0 16px}.header-logo .h-title{font-size:14px}.office-grid{grid-template-columns:1fr}}

@media print{
  .header-actions,.toolbar,#control-sidebar,.control-sidebar{display:none!important}
  body{background:#fff;padding:0!important}
  body.has-control-sidebar{padding-right:0!important}
}

/* ============================ render ============================ */
let _i=0;
function personCard(p, deptKey, opts={}){
  const cls=['person','anim',(deptKey||'gen')+'-c'];
  if(opts.deptMgr) cls.push('is-mgr');
  const badge = opts.badge ? `<span class="badge">${opts.badge}</span>` : '';
  const delay = (_i++ % 14) * 22;
  return `<div class="${cls.join(' ')}" style="animation-delay:${delay}ms"
       data-search="${(p.name+' '+p.title+' '+p.email).toLowerCase()}">
    ${badge}
    <div class="p-name">${p.name}</div>
    <div class="p-title">${p.title}</div>
    <a class="p-mail" href="mailto:${p.email}">${p.email}</a>
  </div>`;
}
function unitBlock(u, deptKey){
  let html = `<div class="unit"><div class="unit-cap">${u.name}</div><div class="stack">`;
  html += personCard(u.manager, deptKey, {badge:'مدير وحدة'});
  (u.members||[]).forEach(m=> html += personCard(m, deptKey));
  (u.teams||[]).forEach(t=>{
    html += `<div class="team"><div class="team-lead">${personCard(t.lead, deptKey,{badge:'قائد فريق'})}</div><div class="members">`;
    t.members.forEach(m=> html += personCard(m, deptKey));
    html += `</div></div>`;
  });
  html += `</div></div>`;
  return html;
}
function deptBlock(d){
  let html = `<section class="dept ${d.key}">
    <div class="dept-head">
      <div class="dept-code">${d.short}</div>
      <div><div class="dh-name">${d.name}</div><div class="dh-sub">${countDept(d)} موظف</div></div>
    </div>`;
  html += personCard(d.manager, d.key, {deptMgr:true, badge:'مدير القسم'});
  d.units.forEach(u=> html += unitBlock(u, d.key));
  html += `</section>`;
  return html;
}
function countUnit(u){ return 1 + (u.members?.length||0) + (u.teams||[]).reduce((s,t)=>s+1+t.members.length,0); }
function countDept(d){ return 1 + d.units.reduce((s,u)=>s+countUnit(u),0); }

function render(){
  const root = document.getElementById('org');
  let html = '';
  html += `<div class="director-wrap"><div class="director anim">
      <div class="d-name">${DIRECTOR.name}</div>
      <div class="d-title">${DIRECTOR.title}</div>
      <a class="d-mail" href="mailto:${DIRECTOR.email}">${DIRECTOR.email}</a>
    </div></div><div class="trunk"></div>`;
  html += `<div class="office">
      <div class="section-cap"><span class="dot" style="background:var(--c-gen)"></span>
        <h2>${OFFICE.name}</h2><small>${OFFICE.members.length} موظف</small></div>
      <div class="office-grid">${OFFICE.members.map(m=>personCard(m,'gen')).join('')}</div>
    </div>`;
  html += `<div class="dept-grid">${DEPARTMENTS.map(deptBlock).join('')}</div>`;
  root.innerHTML = html;

  const statColors=['var(--c-gen)','var(--c-bs)','var(--c-inf)','var(--c-tech)','var(--c-design)'];
  const totals = [
    {n:countAll(), l:'إجمالي الموظفين'},
    {n:DEPARTMENTS.length, l:'الأقسام'},
    {n:totalUnits(), l:'الوحدات'},
    {n:totalTeams(), l:'فرق العمل'},
    {n:1+OFFICE.members.length, l:'الإدارة العامة'}
  ];
  document.getElementById('stats').innerHTML = totals.map((t,i)=>
    `<div class="stat" style="color:${statColors[i]}"><div class="num">${t.n}</div><div class="lbl">${t.l}</div></div>`).join('');
}
function countAll(){ return 1 + OFFICE.members.length + DEPARTMENTS.reduce((s,d)=>s+countDept(d),0); }
function totalUnits(){ return DEPARTMENTS.reduce((s,d)=>s+d.units.length,0); }
function totalTeams(){ return DEPARTMENTS.reduce((s,d)=>s+d.units.reduce((a,u)=>a+(u.teams||[]).length,0),0); }

const search = document.getElementById('search');
search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  const cards = document.querySelectorAll('.person');
  let hits=0;
  cards.forEach(c=>{
    const match = !q || c.dataset.search.includes(q);
    c.classList.toggle('dim', q && !match);
    c.classList.toggle('hit', q && match);
    if(match && q) hits++;
  });
  document.getElementById('empty').style.display = (q && hits===0) ? 'block' : 'none';
});

let emailsShown = true;
function expandToggle(){
  emailsShown = !emailsShown;
  document.querySelectorAll('.p-mail').forEach(e=> e.style.display = emailsShown ? 'inline-block' : 'none');
  document.getElementById('exp-btn').textContent = emailsShown ? 'طيّ الإيميلات' : 'إظهار الإيميلات';
}

render();
</script>
