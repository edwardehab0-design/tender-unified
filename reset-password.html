<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إعادة تعيين كلمة المرور — إدارة المناقصات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #5b3f93; --gold: #c79a3b;
      --bg: #faf8f3; --surface: #fff;
      --border: #efe9db; --ink: #16243d; --text: #4b5163; --muted: #8a8169;
      --red: #d83a3a; --red-bg: #fceced;
      --green: #1a7f4b; --green-bg: #edfaf3;
      --r: 14px; --r-lg: 18px;
      --shadow: 0 8px 32px rgba(20,35,61,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Tajawal", Arial, sans-serif;
      background: radial-gradient(900px 500px at 80% 0%, rgba(91,63,147,.08), transparent 55%),
                  radial-gradient(700px 400px at 10% 100%, rgba(199,154,59,.07), transparent 50%),
                  var(--bg);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-head {
      padding: 28px 28px 20px;
      background: linear-gradient(145deg, #fff, #fdfbf5);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .card-logo {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(145deg, var(--navy), #7b5fc0);
      margin-bottom: 14px;
    }
    .card-logo svg { width: 28px; height: 28px; fill: #fff; }
    .card-head h1 { font-size: 20px; font-weight: 900; color: var(--ink); }
    .card-head p  { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 700; }
    .card-body { padding: 24px 28px 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: var(--r);
      background: var(--bg); color: var(--ink);
      font: inherit; font-size: 14px; font-weight: 700;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(91,63,147,.12); }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(145deg, var(--navy), #7b5fc0);
      color: #fff; border: none; border-radius: var(--r);
      font: inherit; font-size: 15px; font-weight: 900;
      cursor: pointer; transition: opacity .15s, transform .1s;
      margin-top: 6px;
    }
    .btn:hover { opacity: .92; }
    .btn:active { transform: scale(.99); }
    .btn:disabled { opacity: .6; cursor: default; }
    .msg {
      display: none; margin-top: 14px; padding: 11px 14px;
      border-radius: var(--r); font-size: 13px; font-weight: 800; text-align: center;
    }
    .msg.error  { background: var(--red-bg);   border: 1px solid #f5c6c6; color: var(--red);   }
    .msg.success{ background: var(--green-bg); border: 1px solid #a7e3c4; color: var(--green); }
    .msg.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <div class="card-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>إعادة تعيين كلمة المرور</h1>
      <p>أدخل كلمة المرور الجديدة</p>
    </div>
    <div class="card-body">
      <form id="reset-form">
        <div class="field">
          <label for="password">كلمة المرور الجديدة</label>
          <input id="password" type="password" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="password2">تأكيد كلمة المرور</label>
          <input id="password2" type="password" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <button class="btn" type="submit" id="reset-btn">تعيين كلمة المرور</button>
        <div class="msg error"  id="msg-error"></div>
        <div class="msg success" id="msg-success"></div>
      </form>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = window.APP_CONFIG?.supabaseUrl;
    const SUPABASE_KEY = window.APP_CONFIG?.supabaseKey;

    if (!SUPABASE_URL || SUPABASE_URL.includes("__")) {
      showError("إعداد الخادم غير مكتمل.");
    }

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // استخرج الـ token من hash الـ URL
    const hash = Object.fromEntries(
      window.location.hash.slice(1).split("&").map(p => p.split("="))
    );

    if (hash.type !== "recovery" || !hash.access_token) {
      showError("رابط إعادة التعيين غير صالح أو منتهي الصلاحية. اطلب رابطاً جديداً.");
      document.getElementById("reset-form").style.opacity = "0.4";
      document.getElementById("reset-btn").disabled = true;
    } else {
      // نُنشئ جلسة مؤقتة بالتوكن
      sb.auth.setSession({ access_token: hash.access_token, refresh_token: hash.refresh_token || "" });
    }

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const pw1 = document.getElementById("password").value;
      const pw2 = document.getElementById("password2").value;
      if (pw1 !== pw2) { showError("كلمتا المرور غير متطابقتين."); return; }

      const btn = document.getElementById("reset-btn");
      btn.disabled = true;
      btn.textContent = "جارٍ الحفظ…";

      const { error } = await sb.auth.updateUser({ password: pw1 });
      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = "تعيين كلمة المرور";
      } else {
        document.getElementById("msg-success").textContent = "تم تعيين كلمة المرور بنجاح! جارٍ التوجيه…";
        document.getElementById("msg-success").classList.add("show");
        setTimeout(() => { window.location.href = "/login.html"; }, 2000);
      }
    });

    function showError(msg) {
      const el = document.getElementById("msg-error");
      if (el) { el.textContent = msg; el.classList.add("show"); }
    }
  </script>
</body>
</html>
