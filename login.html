<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول — إدارة المناقصات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #5b3f93; --gold: #c79a3b;
      --bg: #faf8f3; --surface: #fff;
      --border: #efe9db; --ink: #16243d; --text: #4b5163; --muted: #8a8169;
      --red: #d83a3a; --red-bg: #fceced;
      --r: 14px; --r-lg: 18px;
      --shadow: 0 8px 32px rgba(20,35,61,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Tajawal", Arial, sans-serif;
      background: radial-gradient(900px 500px at 80% 0%, rgba(91,63,147,.08), transparent 55%),
                  radial-gradient(700px 400px at 10% 100%, rgba(199,154,59,.07), transparent 50%),
                  var(--bg);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--shadow);
      overflow: hidden;
    }
    .login-head {
      padding: 28px 28px 20px;
      background: linear-gradient(145deg, #fff, #fdfbf5);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .login-logo {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(145deg, var(--navy), #7b5fc0);
      margin-bottom: 14px;
    }
    .login-logo svg { width: 28px; height: 28px; fill: #fff; }
    .login-head h1 { font-size: 20px; font-weight: 900; color: var(--ink); }
    .login-head p  { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 700; }
    .login-body { padding: 24px 28px 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: var(--r);
      background: var(--bg); color: var(--ink);
      font: inherit; font-size: 14px; font-weight: 700;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(91,63,147,.12); }
    .login-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(145deg, var(--navy), #7b5fc0);
      color: #fff; border: none; border-radius: var(--r);
      font: inherit; font-size: 15px; font-weight: 900;
      cursor: pointer; transition: opacity .15s, transform .1s;
      margin-top: 6px;
    }
    .login-btn:hover { opacity: .92; }
    .login-btn:active { transform: scale(.99); }
    .login-btn:disabled { opacity: .6; cursor: default; }
    .login-error {
      display: none; margin-top: 14px; padding: 11px 14px;
      background: var(--red-bg); border: 1px solid #f5c6c6;
      border-radius: var(--r); color: var(--red);
      font-size: 13px; font-weight: 800; text-align: center;
    }
    .login-error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-head">
      <div class="login-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>إدارة المناقصات</h1>
      <p>البوابة التشغيلية الداخلية</p>
    </div>
    <div class="login-body">
      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="email">البريد الإلكتروني</label>
          <input id="email" type="email" name="email" placeholder="user@company.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">كلمة المرور</label>
          <input id="password" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="login-btn" type="submit" id="login-btn">دخول</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = window.APP_CONFIG?.supabaseUrl;
    const SUPABASE_KEY = window.APP_CONFIG?.supabaseKey;
    // إن لم تُحقن المفاتيح بعد (متغيرات البيئة غير مضبوطة في Cloudflare)
    if (!SUPABASE_URL || SUPABASE_URL.includes("__")) {
      const errEl = document.getElementById("login-error");
      if (errEl) {
        errEl.textContent = "إعداد الخادم غير مكتمل: لم تُضبط مفاتيح Supabase في بيئة النشر بعد.";
        errEl.classList.add("show");
      }
      throw new Error("Supabase keys not injected");
    }
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // إذا كان المستخدم مسجّلاً دخوله أصلاً، نوجّهه مباشرة
    sb.auth.getSession().then(({ data }) => {
      if (data?.session) redirectAfterLogin(data.session);
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      const errEl = document.getElementById("login-error");
      btn.disabled = true;
      btn.textContent = "جارٍ التحقق…";
      errEl.classList.remove("show");
      try {
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        redirectAfterLogin(data.session);
      } catch (err) {
        errEl.textContent = err.message.includes("Invalid login") ? "البريد أو كلمة المرور غير صحيحة" : err.message;
        errEl.classList.add("show");
        btn.disabled = false;
        btn.textContent = "دخول";
      }
    });

    async function redirectAfterLogin(session) {
      // اقرأ الـ role من جدول profiles ثم وجّه المستخدم
      const { data: profile } = await sb
        .from("profiles").select("role, department_key").eq("id", session.user.id).single();
      // خزّن الـ role في sessionStorage للتوافق مع الكود الحالي
      sessionStorage.setItem("alrawafPortalRole", profile?.role === "executive" ? "manager" : "department");
      if (profile?.department_key)
        sessionStorage.setItem("alrawafDepartmentKey", profile.department_key);
      // توجيه مباشر إلى صفحة المناقصات الجارية بعد الدخول
      window.location.href = "/tenders/";
    }
  </script>
</body>
</html>
